<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GenSpeak</title>
  <link rel="stylesheet" href="style.css">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-LB7CVJ5L8L"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-LB7CVJ5L8L');
  </script>
</head>

<body>
  <main>
    <h1>GenSpeak</h1>
    <p class="subtitle">Translate anything into generational speak (and help decode texts from your kids)</p>

    <div class="translator">
      <textarea id="input" placeholder="Type something to translate..." rows="4" maxlength="500"></textarea>
      <div class="char-count"><span id="char-current">0</span> / 500</div>

      <div class="controls">
        <select id="generation">
          <option value="gen-alpha">Gen Alpha</option>
          <option value="gen-z">Gen Z</option>
          <option value="millennial">Millennial</option>
          <option value="gen-x">Gen X</option>
          <option value="boomer">Boomer</option>
          <option value="corporate">Corporate</option>
        </select>
        <div class="buttons">
          <button id="translate-btn" class="btn-translate">Translate →</button>
          <button id="decode-btn" class="btn-decode">← Decode</button>
        </div>
      </div>

      <div id="output" class="output" hidden>
        <p id="output-text"></p>
      </div>

      <div id="error" class="error" hidden>
        <p id="error-text"></p>
      </div>
    </div>

    <div id="history-section" class="history-section" hidden>
      <div class="history-header">
        <h2>History</h2>
        <button id="clear-history" class="btn-clear">Clear</button>
      </div>
      <div id="history-list" class="history-list"></div>
    </div>
  </main>

  <script src="script.js"></script>
</body>

</html>
